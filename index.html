<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理财工具目录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#10B981',
                        neutral: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-hover {
                @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1;
            }
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <!-- 标题区 -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-neutral mb-2 flex items-center justify-center">
                <i class="fa fa-calculator text-primary mr-2"></i>
                理财工具目录
            </h1>
            <p class="text-gray-500">实用理财计算工具，助力你的财务规划</p>
        </div>

        <!-- 工具列表 -->
        <div class="grid grid-cols-1 gap-6 max-w-md mx-auto">
            <!-- 年化收益率换算工具 -->
            <div class="bg-white rounded-xl p-6 shadow-md card-hover border border-slate-200">
                <div class="flex items-start">
                    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mr-4">
                        <i class="fa fa-percent text-primary text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-semibold text-neutral mb-2">年化收益率换算工具</h3>
                        <p class="text-gray-500 text-sm mb-4">轻松计算不同周期收益率与年化收益率的换算，支持日息、月息、季息转换</p>
                        <a href="FinancialRate.html" class="inline-flex items-center text-primary hover:text-primary/80">
                            打开工具 <i class="fa fa-arrow-right ml-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部说明 -->
        <div class="mt-12 text-center text-sm text-gray-500">
            <p>工具数据仅在本地计算，保护你的财务隐私</p>
            <p class="mt-2">更多理财工具将持续更新...</p>
        </div>
    </div>
</body>
</html>
