<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理财产品年化收益率计算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6B7280',
                        neutral: '#2C3E50',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .input-focus {
                @apply focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none;
            }
            .card-shadow {
                @apply shadow-md hover:shadow-lg transition-shadow;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">
    <div class="max-w-md mx-auto bg-white rounded-xl p-6 card-shadow relative">
        <!-- 标题栏（含返回按钮） -->
        <div class="flex items-center justify-center mb-8 relative">
            <a href="index.html" class="absolute left-0 text-gray-600 hover:text-neutral transition-colors">
                <i class="fa fa-arrow-left mr-1"></i> 返回
            </a>
            <h1 class="text-2xl font-bold text-neutral">
                <i class="fa fa-university text-primary text-2xl mr-2"></i>理财年化收益率计算
            </h1>
        </div>

        <div class="space-y-6">
            <!-- 输入区域 -->
            <div class="grid gap-6">
                <div>
                    <label for="currentValue" class="block text-sm font-medium text-gray-700 mb-1">
                        当前产品总金额（元）
                    </label>
                    <input type="number" id="currentValue" placeholder="例如：10150.50" min="0.01" step="0.01"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 input-focus">
                    <p class="text-xs text-gray-500 mt-1">包含本金和已产生的全部收益</p>
                </div>

                <div>
                    <label for="days" class="block text-sm font-medium text-gray-700 mb-1">
                        持有天数
                    </label>
                    <input type="number" id="days" placeholder="例如：90" min="1" step="1"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 input-focus">
                    <p class="text-xs text-gray-500 mt-1">持有该产品的总天数</p>
                </div>

                <div>
                    <label for="income" class="block text-sm font-medium text-gray-700 mb-1">
                        获得收益（元）
                    </label>
                    <input type="number" id="income" placeholder="例如：150.50" min="0" step="0.01"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 input-focus">
                    <p class="text-xs text-gray-500 mt-1">持有期间获得的总收益（当前总金额 - 本金）</p>
                </div>
            </div>

            <!-- 结果区域 -->
            <div class="p-5 bg-gray-50 rounded-lg border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500 mb-3">计算结果</h3>
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                        <span class="text-gray-600">本金金额</span>
                        <span id="principal" class="font-semibold">0.00 元</span>
                    </div>
                    
                    <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                        <span class="text-gray-600">年化收益率</span>
                        <span id="annualRate" class="text-2xl font-bold text-primary">0.00%</span>
                    </div>
                    
                    <div class="bg-blue-50 p-3 rounded-md text-sm text-gray-700">
                        <p class="flex items-start">
                            <i class="fa fa-info-circle text-primary mt-0.5 mr-2"></i>
                            <span>年化收益率是将当前收益换算为全年收益的比率，便于对比不同期限产品的收益水平</span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- 计算说明 -->
            <div class="text-xs text-gray-500 bg-gray-50 p-3 rounded-md">
                <p class="font-medium mb-1">计算公式：</p>
                <p>1. 本金 = 当前产品总金额 - 收益</p>
                <p>2. 年化收益率 =（收益 ÷ 本金）÷ 持有天数 × 365 × 100%</p>
                <p class="mt-1">（先通过当前总金额反推本金，再计算日均收益并换算为全年收益率）</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentValueInput = document.getElementById('currentValue');
            const daysInput = document.getElementById('days');
            const incomeInput = document.getElementById('income');
            const principalElement = document.getElementById('principal');
            const annualRateElement = document.getElementById('annualRate');

            // 计算年化收益率
            function calculateAnnualRate() {
                const currentValue = parseFloat(currentValueInput.value) || 0;
                const days = parseInt(daysInput.value) || 0;
                const income = parseFloat(incomeInput.value) || 0;

                // 计算本金（当前总金额 - 收益）
                const principal = Math.max(0, currentValue - income);
                principalElement.textContent = principal.toFixed(2) + ' 元';

                // 避免除数为0
                if (principal <= 0 || days <= 0 || income <= 0) {
                    annualRateElement.textContent = '0.00%';
                    return;
                }

                // 计算年化收益率：(收益/本金)÷持有天数×365×100%
                const dailyRate = income / principal / days;
                const annualRate = dailyRate * 365 * 100;
                
                // 保留两位小数显示
                annualRateElement.textContent = annualRate.toFixed(2) + '%';
            }

            // 输入变化时实时计算
            currentValueInput.addEventListener('input', calculateAnnualRate);
            daysInput.addEventListener('input', calculateAnnualRate);
            incomeInput.addEventListener('input', calculateAnnualRate);
        });
    </script>
</body>
</html>
